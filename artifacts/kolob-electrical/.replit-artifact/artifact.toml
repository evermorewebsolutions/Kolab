kind = "web"
previewPath = "/"
title = "Kolob Electrical and Projects"
version = "1.0.0"
id = "artifacts/kolob-electrical"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18159

[services.development]
run = "pnpm --filter @workspace/kolob-electrical run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/kolob-electrical", "run", "build" ]
publicDir = "artifacts/kolob-electrical/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18159"
BASE_PATH = "/"
